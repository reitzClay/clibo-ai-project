services:
  # The Core Data
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: clibo
      POSTGRES_PASSWORD: clibo_password
    ports:
      - "5432:5432"

  # The Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # The Visualization (Critical for the Journey)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  # The Event Bus (Kafka)
  # kafka:
  #   image: apache/kafka-native:4.2.0
  #   ports:
  #     - "9092:9092"

  # The database tools (pgadmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    ports:
      - "5050:80"  # Changed from 8080 to 5050
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clibo.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    depends_on:
      - postgres