# ==============================================================================
# CLIBO API CONFIGURATION
# ==============================================================================

# 1. STOP QUARKUS FROM PULLING MODELS (Disable DevServices)
# ------------------------------------------------------------------------------
quarkus.langchain4j.ollama.devservices.enabled=false

# 2. POINT TO YOUR LOCAL WSL2 OLLAMA
# ------------------------------------------------------------------------------
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
quarkus.langchain4j.ollama.chat-model.temperature=0.7

# swagger UI theme
# ------------------------------------------------------------------------------
# SWAGGER UI DARK MODE
# ------------------------------------------------------------------------------
# quarkus.swagger-ui.theme=feeling-blue
# quarkus.swagger-ui.theme=outline 
# quarkus.swagger-ui.theme=muted 
# quarkus.swagger-ui.theme=monokai 

# 3. HTTP & CORS (Flutter Access)
# ------------------------------------------------------------------------------
# quarkus.http.port=8080
# Explicitly enable via .enabled to satisfy warnings
# quarkus.http.cors.enabled=true
# quarkus.http.cors.origins=*
# quarkus.http.cors.methods=GET,POST,OPTIONS


# 4. Logging & Performance (Updated for Quarkus 3.15.x)
# ------------------------------------------------------------------------------
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true
# Increase buffer for high-token streaming
# quarkus.websocket.max-frame-size=1048576

# 6. STABILITY & MEMORY (CRITICAL: Fixes HTTP 400 Crashes)
# ------------------------------------------------------------------------------
# Prevent 400 Bad Request by capping the context window (Moved to provider level)
quarkus.langchain4j.ollama.timeout=60s
# Prevent timeouts during long generation (Moved to provider level)
# quarkus.langchain4j.ollama.context-length=2048
# Register the ChatMemory bean
# Note: If warning persists, this is now handled via the langchain4j-common extension
# or specific @RegisterAiService configuration.
# quarkus.langchain4j.chat-memory.enabled=true

# 7. enable instrumentation based reload
# ------------------------------------------------------------------------------
quarkus.live-reload.instrumentation=true

# Keycloak Auth
# quarkus.oidc.auth-server-url=http://keycloak:8080/realms/clibo
# quarkus.oidc.client-id=clibo-backend
# quarkus.http.auth.permission.authenticated.paths=/*
# quarkus.http.auth.permission.authenticated.policy=authenticated

# # Tier-Based Access (Sentient vs Clay)
# quarkus.http.auth.permission.sentient.paths=/clibo/vision/*
# quarkus.http.auth.permission.sentient.policy=sentient-role-policy

# # Kubernetes Scaling
# quarkus.kubernetes.replicas=3
# quarkus.kubernetes.ingress.expose=true

# Outgoing Haptics to EMQX
# mp.messaging.outgoing.haptics-out.connector=smallrye-mqtt
# mp.messaging.outgoing.haptics-out.topic=clibo/phys/haptics

# Existing Channel Logic
# mp.messaging.incoming.words-in.auto.offset.reset=earliest
# mp.messaging.incoming.words-in.topic=words
# mp.messaging.outgoing.words-out.topic=words

# Connection to our Stable Docker-Compose Kafka
kafka.bootstrap.servers=localhost:9092

# New Channel Logic
mp.messaging.incoming.words-in.connector=smallrye-kafka
mp.messaging.incoming.words-in.auto.offset.reset=earliest
mp.messaging.incoming.words-in.topic=words

mp.messaging.outgoing.words-out.connector=smallrye-kafka
mp.messaging.outgoing.words-out.topic=words

# Disable DevServices so Quarkus doesn't spin up a second Kafka
quarkus.kafka.devservices.enabled=false