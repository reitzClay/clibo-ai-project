# ==============================================================================
# CLIBO API CONFIGURATION
# ==============================================================================

# 1. STOP QUARKUS FROM PULLING MODELS (Disable DevServices)
# ------------------------------------------------------------------------------
quarkus.langchain4j.ollama.devservices.enabled=false

# 2. PROVIDER SELECTION & OLLAMA CONFIG (Fixes Ambiguity Error)
# ------------------------------------------------------------------------------
# Explicitly set the provider to resolve the OpenAI/Ollama conflict
quarkus.langchain4j.chat-model.provider=ollama

quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2:3b
quarkus.langchain4j.ollama.chat-model.temperature=0.7

# 3. HTTP & CORS (Flutter Access)
# ------------------------------------------------------------------------------
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS

# 4. Logging & Performance
# ------------------------------------------------------------------------------
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# 6. STABILITY & MEMORY
# ------------------------------------------------------------------------------
quarkus.langchain4j.ollama.timeout=60s

# 7. LIVE RELOAD
# ------------------------------------------------------------------------------
quarkus.live-reload.instrumentation=true

# KAFKA CONFIGURATION
# ------------------------------------------------------------------------------
# kafka.bootstrap.servers=localhost:9092

# mp.messaging.incoming.words-in.connector=smallrye-kafka
# mp.messaging.incoming.words-in.auto.offset.reset=earliest
# mp.messaging.incoming.words-in.topic=words

# mp.messaging.outgoing.words-out.connector=smallrye-kafka
# mp.messaging.outgoing.words-out.topic=words

# quarkus.kafka.devservices.enabled=true

# 8. DATABASE CONFIGURATION
# ------------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=clibo
quarkus.datasource.password=clibo_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres

# Hibernate Settings
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.jdbc.timezone=UTC 

# Disable DevServices
quarkus.datasource.devservices.enabled=false
%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

# Force bind to all interfaces for ADB bridge stability
quarkus.http.host=0.0.0.0

# Force Hibernate to run the script even on 'update'
#javax.persistence.sql-load-script-source=import.sql

# Or the Quarkus way:
quarkus.hibernate-orm.sql-load-script=import.sql
